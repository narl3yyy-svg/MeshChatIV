# Pinned first-party actions (bump tag and SHA together when upgrading):
#   actions/checkout@v6.0.1                       8e8c483db84b4bee98b60c0593521ed34d9990e8
#   github/codeql-action/init@v4.31.6             95e58e9a2cdfd71adc6e0353d5c52f41a045d225
#   github/codeql-action/analyze@v4.31.6          95e58e9a2cdfd71adc6e0353d5c52f41a045d225

name: "CodeQL Advanced"

on:
    push:
        branches: ["master", "dev"]
    pull_request:
        branches: ["master", "dev"]
    schedule:
        - cron: "35 18 * * 3"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    analyze:
        name: Analyze (${{ matrix.language }})
        runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
        timeout-minutes: 360
        permissions:
            security-events: write
            packages: read
            actions: read
            contents: read

        strategy:
            fail-fast: false
            matrix:
                include:
                    - language: actions
                      build-mode: none
                    - language: go
                      build-mode: autobuild
                    - language: java-kotlin
                      build-mode: none
                    - language: javascript-typescript
                      build-mode: none
                    - language: python
                      build-mode: none

        steps:
            - name: Checkout repository
              uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

            - name: Initialize CodeQL
              uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
              with:
                  languages: ${{ matrix.language }}
                  build-mode: ${{ matrix.build-mode }}

            - name: Run manual build steps
              if: matrix.build-mode == 'manual'
              shell: bash
              run: |
                  echo 'Manual build mode requires custom build commands.'
                  exit 1

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
              with:
                  category: "/language:${{matrix.language}}"
